<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перегляд PDF</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { margin: 0; min-height: 100vh; background: #f4f7fb; color: #111; font-family: Inter, sans-serif; }
        .pdf-viewer-shell { display: flex; flex-direction: column; min-height: 100vh; }
        .pdf-viewer-bar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem 1.25rem; background: #fff; border-bottom: 1px solid rgba(15,23,42,.08); box-shadow: 0 1px 2px rgba(15,23,42,.08); }
        .pdf-viewer-bar h1 { margin: 0; font-size: 1rem; line-height: 1.3; }
        .pdf-viewer-actions { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
        .pdf-viewer-actions .btn { white-space: nowrap; }
        .pdf-viewer-frame { flex: 1; min-height: 0; }
        .pdf-viewer-frame iframe { width: 100%; height: calc(100vh - 72px); border: none; background: #fff; }
        .pdf-viewer-empty { padding: 4rem 1.5rem; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="pdf-viewer-shell">
        <div class="pdf-viewer-bar">
            <div>
                <h1 id="pdf-title">Перегляд документа</h1>
            </div>
            <div class="pdf-viewer-actions">
                <a id="open-link" class="btn btn-ghost btn-sm" target="_blank" rel="noopener">Відкрити у новому вікні</a>
                <a id="download-link" class="btn btn-secondary btn-sm" target="_blank" rel="noopener">Завантажити</a>
            </div>
        </div>

        <div id="viewer-frame" class="pdf-viewer-frame">
            <div class="pdf-viewer-empty" id="viewer-empty">Завантаження документа...</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const title = params.get('title') || 'PDF документ';
        const openLink = document.getElementById('open-link');
        const downloadLink = document.getElementById('download-link');
        const titleEl = document.getElementById('pdf-title');
        const frameContainer = document.getElementById('viewer-frame');

        if (!file) {
            frameContainer.innerHTML = `<div class="pdf-viewer-empty">Немає вказаного файла для перегляду.</div>`;
            openLink.style.display = 'none';
            downloadLink.style.display = 'none';
            titleEl.textContent = 'Помилка завантаження';
        } else {
            const fileUrl = new URL(file, window.location.href).toString();
            titleEl.textContent = title;
            openLink.href = fileUrl;
            downloadLink.href = fileUrl;
            downloadLink.setAttribute('download', title);
            const pdfJsViewer = new URL('pdf viewer/Смарт-Скарб - Навчальний портал_files/viewer.html', window.location.href);
            pdfJsViewer.searchParams.set('file', fileUrl);
            frameContainer.innerHTML = `<iframe src="${pdfJsViewer.toString()}" title="${title}"></iframe>`;
        }
    </script>
</body>
</html>
