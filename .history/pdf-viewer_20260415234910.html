<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>LMS Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: #020617;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 10;
    }

    #viewer {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      margin-bottom: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

<div id="toolbar">
  📄 LMS Viewer
</div>

<div id="viewer"></div>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const API_URL = "/api/resource-url"; // твой backend

const params = new URLSearchParams(window.location.search);
const resourceId = params.get('id');

let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let startTime = Date.now();

// 🔐 Получаем защищённый URL
async function getPdfUrl() {
  const res = await fetch(`${API_URL}?id=${resourceId}`, {
    credentials: 'include'
  });

  const data = await res.json();
  return data.url;
}

// 📄 Рендер PDF
async function renderPDF(url) {
  pdfDoc = await pdfjsLib.getDocument(url).promise;
  totalPages = pdfDoc.numPages;

  for (let i = 1; i <= totalPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: 1.5 });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    document.getElementById("viewer").appendChild(canvas);

    await page.render({ canvasContext: context, viewport }).promise;
  }
}

// 📊 Сохранение прогресса
async function saveProgress(page) {
  const progress = (page / totalPages) * 100;
  const timeSpent = Math.floor((Date.now() - startTime) / 1000);

  await fetch("/api/progress", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      resource_id: resourceId,
      page,
      progress,
      time_spent: timeSpent
    })
  });
}

// 👀 Отслеживание скролла
window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;
  const page = Math.floor(scrollY / 800) + 1;

  if (page !== currentPage) {
    currentPage = page;
    saveProgress(page);
  }
});

// 🔥 Анти-слив
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['s','p','u'].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});
document.oncontextmenu = () => false;

// 🚀 INIT
(async () => {
  const url = await getPdfUrl();
  await renderPDF(url);
})();
</script>

</body>
</html>
