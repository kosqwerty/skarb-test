<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LMS PDF Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
}

#toolbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: #020617;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

#progress {
  font-size: 14px;
}

#viewer {
  margin-top: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.page {
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="toolbar">
  <div>📄 LMS Viewer</div>
  <div id="progress">0%</div>
</div>

<div id="viewer"></div>

<script>
// 🔧 CONFIG
const url = new URLSearchParams(location.search).get("file");

if (!url) {
  document.body.innerHTML = "Нет файла";
  throw new Error("No file");
}

// 🔥 INIT PDF
let pdfDoc = null;
let totalPages = 0;
let currentPage = 1;
let startTime = Date.now();
let renderedPages = [];

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// 🚀 Загрузка PDF
async function loadPDF() {
  pdfDoc = await pdfjsLib.getDocument(url).promise;
  totalPages = pdfDoc.numPages;

  for (let i = 1; i <= totalPages; i++) {
    renderPage(i);
  }
}

// 📄 Рендер страницы
async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });

  const wrapper = document.createElement("div");
  wrapper.className = "page";

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.height = viewport.height;
  canvas.width = viewport.width;

  wrapper.appendChild(canvas);
  document.getElementById("viewer").appendChild(wrapper);

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  renderedPages.push(wrapper);
}

// 📊 Определение текущей страницы
function detectPage() {
  let closest = 0;
  let minDiff = Infinity;

  renderedPages.forEach((el, index) => {
    const rect = el.getBoundingClientRect();
    const diff = Math.abs(rect.top);

    if (diff < minDiff) {
      minDiff = diff;
      closest = index + 1;
    }
  });

  return closest;
}

// 💾 Сохранение прогресса
function saveProgress(page) {
  const progress = Math.floor((page / totalPages) * 100);
  document.getElementById("progress").innerText = progress + "%";

  const timeSpent = Math.floor((Date.now() - startTime) / 1000);

  console.log("SAVE:", {
    page,
    progress,
    timeSpent
  });

  // 👉 сюда потом подключишь API
}

// 👀 Scroll tracking
let lastPage = 1;

window.addEventListener("scroll", () => {
  if (!renderedPages.length) return;

  const page = detectPage();

  if (page !== lastPage) {
    lastPage = page;
    saveProgress(page);
  }
});

// 🔥 Анти-слив
document.addEventListener("keydown", e => {
  if (e.ctrlKey && ["s","p","u"].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});
document.oncontextmenu = () => false;

// 🚀 START
loadPDF();
</script>

</body>
</html>
