!<html>
    <style>
        /* ==================================================
   Цветовая система для LMS/SaaS
   Современный, дорогой, минималистичный дизайн
   ================================================== */

:root {
  /* Светлая тема (по умолчанию) */
  --bg: #f8fafc;           /* мягкий серо-голубой фон */
  --surface: #ffffff;      /* белый для карточек */
  --border: #e2e8f0;       /* светлая граница */
  
  /* Акценты */
  --primary: #3b82f6;      /* холодный синий */
  --primary-hover: #2563eb;
  --primary-active: #1d4ed8;
  --primary-rgb: 59, 130, 246;
  
  --secondary: #6366f1;    /* индиго */
  --secondary-hover: #4f46e5;
  --secondary-rgb: 99, 102, 241;
  
  /* Текст */
  --text-primary: #0f172a; /* slate-900 */
  --text-secondary: #475569; /* slate-600 */
  
  /* Семантические цвета */
  --success: #10b981;      /* изумрудный */
  --success-rgb: 16, 185, 129;
  --warning: #f59e0b;      /* янтарный */
  --warning-rgb: 245, 158, 11;
  --danger: #ef4444;       /* красный */
  --danger-rgb: 239, 68, 68;
  
  /* Тени */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
  --shadow-focus: 0 0 0 3px rgba(59, 130, 246, 0.3);
  
  /* Градиенты */
  --gradient-primary: linear-gradient(135deg, var(--primary), var(--secondary));
  --gradient-success: linear-gradient(135deg, #10b981, #34d399);
  
  /* Прозрачности */
  --surface-muted: rgba(0, 0, 0, 0.02);
  --surface-hover: rgba(0, 0, 0, 0.04);
  --border-light: rgba(0, 0, 0, 0.06);
}

.dark {
  /* Тёмная тема */
  --bg: #0f172a;           /* slate-900 — глубокий тёмно-синий */
  --surface: #1e293b;      /* slate-800 — чуть светлее фона */
  --border: #334155;       /* slate-700 */
  
  --primary: #3b82f6;
  --primary-hover: #60a5fa;
  --primary-active: #93c5fd;
  --primary-rgb: 59, 130, 246;
  
  --secondary: #818cf8;
  --secondary-hover: #a5b4fc;
  --secondary-rgb: 129, 140, 248;
  
  --text-primary: #f1f5f9; /* slate-100 */
  --text-secondary: #94a3b8; /* slate-400 */
  
  --success: #34d399;
  --success-rgb: 52, 211, 153;
  --warning: #fbbf24;
  --warning-rgb: 251, 191, 36;
  --danger: #f87171;
  --danger-rgb: 248, 113, 113;
  
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.25);
  --shadow-focus: 0 0 0 3px rgba(59, 130, 246, 0.5);
  
  --gradient-primary: linear-gradient(135deg, #3b82f6, #818cf8);
  --gradient-success: linear-gradient(135deg, #10b981, #34d399);
  
  --surface-muted: rgba(255, 255, 255, 0.02);
  --surface-hover: rgba(255, 255, 255, 0.05);
  --border-light: rgba(255, 255, 255, 0.08);
}

/* ==================================================
   Глобальные стили
   ================================================== */
* {
  box-sizing: border-box;
}

body {
  background-color: var(--bg);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  transition: background-color 0.2s ease, color 0.2s ease;
  margin: 0;
  padding: 2rem;
}

/* ==================================================
   UI Компоненты (примеры)
   ================================================== */

/* ----- Кнопки ----- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.6rem 1.2rem;
  font-size: 0.875rem;
  font-weight: 500;
  border-radius: 0.5rem;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
  background: none;
}

.btn-primary {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.btn-primary:hover {
  background: var(--primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.btn-primary:focus {
  outline: none;
  box-shadow: var(--shadow-focus);
}
.btn-primary:active {
  transform: translateY(0);
  background: var(--primary-active);
}

.btn-secondary {
  background: var(--secondary);
  color: white;
}
.btn-secondary:hover {
  background: var(--secondary-hover);
  transform: translateY(-1px);
}

.btn-outline {
  background: transparent;
  border-color: var(--border);
  color: var(--text-primary);
}
.btn-outline:hover {
  background: var(--surface-hover);
  border-color: var(--text-secondary);
}
.btn-outline:focus {
  outline: none;
  box-shadow: var(--shadow-focus);
  border-color: var(--primary);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}
.btn-ghost:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}

.btn-gradient {
  background: var(--gradient-primary);
  color: white;
  border: none;
}
.btn-gradient:hover {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

/* ----- Карточки ----- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}
.card:hover {
  box-shadow: var(--shadow-md);
}
.card-header {
  margin-bottom: 1rem;
  font-weight: 600;
  font-size: 1.125rem;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 0.75rem;
}
.card-footer {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border-light);
  font-size: 0.875rem;
  color: var(--text-secondary);
}

/* ----- Таблица ----- */
.table-wrapper {
  overflow-x: auto;
  border-radius: 0.75rem;
  border: 1px solid var(--border);
  background: var(--surface);
}
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}
.table th {
  text-align: left;
  padding: 0.75rem 1rem;
  background: var(--surface-muted);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  color: var(--text-primary);
}
.table td {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
}
.table tr:last-child td {
  border-bottom: none;
}
.table tr:hover td {
  background: var(--surface-hover);
}

/* ----- Инпуты ----- */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.input-label {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-primary);
}
.input-field {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  padding: 0.6rem 1rem;
  font-size: 0.875rem;
  font-family: inherit;
  color: var(--text-primary);
  transition: border 0.15s ease, box-shadow 0.15s ease;
}
.input-field:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: var(--shadow-focus);
}
.input-field::placeholder {
  color: var(--text-secondary);
  opacity: 0.6;
}
.input-error {
  border-color: var(--danger);
}
.input-error:focus {
  box-shadow: 0 0 0 3px rgba(var(--danger-rgb), 0.2);
}
.error-message {
  font-size: 0.75rem;
  color: var(--danger);
}

/* ----- Дополнительные элементы (бейджи, выделения) ----- */
.badge {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  font-size: 0.75rem;
  font-weight: 500;
  border-radius: 9999px;
  background: var(--surface-muted);
  color: var(--text-secondary);
}
.badge-success {
  background: rgba(var(--success-rgb), 0.1);
  color: var(--success);
}
.badge-warning {
  background: rgba(var(--warning-rgb), 0.1);
  color: var(--warning);
}
.badge-danger {
  background: rgba(var(--danger-rgb), 0.1);
  color: var(--danger);
}

/* Пример сетки для демонстрации */
.demo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-top: 2rem;
}
    </style>
    <body>
        <!-- ==================================================
     Демонстрация UI компонентов
     ================================================== -->
<div class="demo-grid">
  <!-- Карточка с кнопками -->
  <div class="card">
    <div class="card-header">Управление курсом</div>
    <p style="margin-bottom: 1rem; color: var(--text-secondary);">
      Продвинутый курс по дизайн-системам и современному UX.
    </p>
    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
      <button class="btn btn-primary">Старт</button>
      <button class="btn btn-outline">Подробнее</button>
      <button class="btn btn-ghost">Отмена</button>
    </div>
    <div class="card-footer">
      <span class="badge badge-success">Активен</span>
      <span class="badge" style="margin-left: 0.5rem;">12 уроков</span>
    </div>
  </div>

  <!-- Пример таблицы -->
  <div class="card" style="padding: 0; overflow: hidden;">
    <div style="padding: 1rem 1rem 0 1rem;">
      <h3 style="margin: 0; font-size: 1rem;">Студенты</h3>
    </div>
    <div class="table-wrapper" style="border: none; border-radius: 0;">
      <table class="table">
        <thead>
          <tr><th>Имя</th><th>Прогресс</th><th>Статус</th></tr>
        </thead>
        <tbody>
          <tr><td>Анна К.</td><td>78%</td><td><span class="badge badge-success">Активен</span></td></tr>
          <tr><td>Максим Л.</td><td>45%</td><td><span class="badge badge-warning">На паузе</span></td></tr>
          <tr><td>Елена В.</td><td>92%</td><td><span class="badge badge-success">Активен</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Форма с инпутами -->
  <div class="card">
    <div class="card-header">Обратная связь</div>
    <div class="input-group" style="margin-bottom: 1rem;">
      <label class="input-label">Тема</label>
      <input class="input-field" type="text" placeholder="Например, вопрос по уроку 3">
    </div>
    <div class="input-group" style="margin-bottom: 1rem;">
      <label class="input-label">Сообщение</label>
      <textarea class="input-field" rows="3" placeholder="Ваш текст..."></textarea>
    </div>
    <div class="input-group" style="margin-bottom: 1rem;">
      <label class="input-label">Email (ошибочный)</label>
      <input class="input-field input-error" type="email" value="invalid-email">
      <span class="error-message">Введите корректный email</span>
    </div>
    <div style="display: flex; justify-content: flex-end;">
      <button class="btn btn-gradient">Отправить</button>
    </div>
  </div>
</div>

<!-- Кнопка переключения темы (пример на JS, если нужно) -->
<div style="margin-bottom: 2rem;">
  <button class="btn btn-outline" id="theme-toggle">🌓 Переключить тему</button>
</div>

<script>
  // Простой переключатель темы (демонстрация)
  const toggleBtn = document.getElementById('theme-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });
  }
</script>
    </body>
</html>
