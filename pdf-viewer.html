<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>LMS PDF Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #525659;
  color: #fff;
  font-family: Arial, sans-serif;
  user-select: none;
}

/* ── Toolbar ── */
#toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: #3c3f41;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 10px;
  z-index: 200;
  box-shadow: 0 2px 6px rgba(0,0,0,.5);
}

.tb-sep {
  width: 1px;
  height: 24px;
  background: #555;
  margin: 0 4px;
}

.tb-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: transparent;
  border: none;
  border-radius: 4px;
  color: #ddd;
  cursor: pointer;
  font-size: 16px;
  transition: background .15s;
  flex-shrink: 0;
}
.tb-btn:hover:not(:disabled) { background: #555; color: #fff; }
.tb-btn:disabled { opacity: .35; cursor: default; }

#page-input {
  width: 42px;
  text-align: center;
  background: #525659;
  border: 1px solid #666;
  border-radius: 4px;
  color: #fff;
  font-size: 13px;
  padding: 3px 4px;
  outline: none;
}
#page-input:focus { border-color: #aaa; }

#page-total {
  font-size: 13px;
  color: #aaa;
  white-space: nowrap;
}

#zoom-select {
  background: #525659;
  border: 1px solid #666;
  border-radius: 3px;
  color: #fff;
  font-size: 13px;
  padding: 3px 6px;
  outline: none;
  cursor: pointer;
}

#toolbar-title {
  flex: 1;
  font-size: 13px;
  color: #ccc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 8px;
}

#download-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #3b82f6;
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 13px;
  padding: 5px 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s;
}
#download-btn:hover { background: #2563eb; }

/* ── Viewer ── */
#viewer-wrap {
  margin-top: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  gap: 12px;
}

.page-wrap {
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
}
canvas { display: block; }

#error-msg {
  margin-top: 120px;
  text-align: center;
  color: #f87171;
  font-size: 15px;
  line-height: 1.6;
}

#loading-msg {
  margin-top: 120px;
  text-align: center;
  color: #aaa;
  font-size: 14px;
}
</style>
</head>
<body>

<div id="toolbar">
  <!-- Навігація по сторінках -->
  <button class="tb-btn" id="btn-first"  title="Перша сторінка">⏮</button>
  <button class="tb-btn" id="btn-prev"   title="Попередня (←)">‹</button>
  <input  id="page-input" type="number" min="1" value="1" title="Номер сторінки">
  <span   id="page-total" style="font-size:13px;color:#aaa">/ —</span>
  <button class="tb-btn" id="btn-next"   title="Наступна (→)">›</button>
  <button class="tb-btn" id="btn-last"   title="Остання сторінка">⏭</button>

  <div class="tb-sep"></div>

  <!-- Масштаб -->
  <button class="tb-btn" id="btn-zoom-out" title="Зменшити (-)">−</button>
  <select id="zoom-select" title="Масштаб">
    <option value="0.5">50%</option>
    <option value="0.75">75%</option>
    <option value="1">100%</option>
    <option value="1.25">125%</option>
    <option value="1.5">150%</option>
    <option value="2">200%</option>
    <option value="fit" selected>По ширині</option>
  </select>
  <button class="tb-btn" id="btn-zoom-in"  title="Збільшити (+)">+</button>

  <div class="tb-sep"></div>

  <!-- Поворот -->
  <button class="tb-btn" id="btn-rot-l" title="Повернути ліворуч">↺</button>
  <button class="tb-btn" id="btn-rot-r" title="Повернути праворуч">↻</button>

  <div class="tb-sep"></div>

  <!-- Назва + кнопка завантаження -->
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;justify-content:flex-start">
    <div id="toolbar-title" style="flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
    <button id="download-btn" style="display:none;flex-shrink:0" title="Завантажити PDF">
      ⬇ Завантажити
    </button>
  </div>
</div>

<div id="viewer-wrap">
  <div id="loading-msg">Завантаження PDF…</div>
</div>

<script>
const params     = new URLSearchParams(location.search);
const fileUrl    = params.get('file');
const title      = params.get('title') || 'PDF';
const canDownload = params.get('download') === '1';

document.getElementById('toolbar-title').textContent = title;

if (!fileUrl) {
  document.getElementById('viewer-wrap').innerHTML =
    '<div id="error-msg">Файл не вказано.</div>';
  throw new Error('No file param');
}

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──────────────────────────────────────────────────────────────────
let pdfDoc     = null;
let totalPages = 0;
let currentPage = 1;
let scale      = 'fit';
let rotation   = 0;
let rendering  = false;

const SCALE_STEP = 0.25;
const SCALE_MIN  = 0.25;
const SCALE_MAX  = 4.0;

// ── DOM refs ───────────────────────────────────────────────────────────────
const wrap       = document.getElementById('viewer-wrap');
const pageInput  = document.getElementById('page-input');
const pageTotal  = document.getElementById('page-total');
const zoomSelect = document.getElementById('zoom-select');

// ── Render ─────────────────────────────────────────────────────────────────
async function renderAll() {
  if (!pdfDoc || rendering) return;
  rendering = true;

  wrap.innerHTML = '';

  for (let i = 1; i <= totalPages; i++) {
    const page     = await pdfDoc.getPage(i);
    const effectiveScale = scale === 'fit'
      ? (wrap.clientWidth - 40) / page.getViewport({ scale: 1, rotation }).width
      : scale;
    const viewport = page.getViewport({ scale: effectiveScale, rotation });

    const pageWrap = document.createElement('div');
    pageWrap.className = 'page-wrap';
    pageWrap.dataset.page = i;

    const canvas  = document.createElement('canvas');
    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    pageWrap.appendChild(canvas);
    wrap.appendChild(pageWrap);

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }

  rendering = false;
  updateNav();
  scrollToPage(currentPage, false);
}

// ── Navigation ─────────────────────────────────────────────────────────────
function scrollToPage(num, smooth = true) {
  const el = wrap.querySelector(`[data-page="${num}"]`);
  if (el) el.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', block: 'start' });
}

function goTo(num) {
  num = Math.max(1, Math.min(totalPages, num));
  currentPage = num;
  pageInput.value = num;
  scrollToPage(num);
  updateNav();
  if (num === totalPages) setTimeout(notifyScrollEnd, 600);
}

function updateNav() {
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-prev').disabled  = currentPage <= 1;
  document.getElementById('btn-next').disabled  = currentPage >= totalPages;
  document.getElementById('btn-last').disabled  = currentPage >= totalPages;
}

// ── Zoom ───────────────────────────────────────────────────────────────────
function setScale(val) {
  if (val === 'fit') {
    scale = 'fit';
    zoomSelect.value = 'fit';
  } else {
    scale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, parseFloat(val)));
    // sync select if matches option
    const opt = [...zoomSelect.options].find(o => parseFloat(o.value) === scale);
    zoomSelect.value = opt ? opt.value : zoomSelect.value;
  }
  renderAll();
}

// ── Scroll → page tracker ──────────────────────────────────────────────────
let scrollEndSent = false;

function notifyScrollEnd() {
  if (scrollEndSent) return;
  scrollEndSent = true;
  window.parent.postMessage({ type: 'pdf-scroll-end' }, '*');
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio >= 0.1) {
      const p = parseInt(e.target.dataset.page);
      if (p !== currentPage) {
        currentPage = p;
        pageInput.value = p;
        updateNav();
      }
      if (p === totalPages) notifyScrollEnd();
    }
  });
}, { threshold: [0.1, 0.4] });

function observePages() {
  wrap.querySelectorAll('.page-wrap').forEach(el => io.observe(el));
  if (totalPages === 1) notifyScrollEnd();
  wrap.addEventListener('scroll', () => {
    if (wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 80) notifyScrollEnd();
  }, { passive: true });
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadPDF() {
  try {
    pdfDoc     = await pdfjsLib.getDocument(fileUrl).promise;
    totalPages = pdfDoc.numPages;
    pageTotal.textContent  = '/ ' + totalPages;
    pageInput.max          = totalPages;

    await renderAll();
    observePages();

    document.getElementById('loading-msg')?.remove();

    document.getElementById('download-btn').style.display = 'none';
  } catch (e) {
    wrap.innerHTML = `<div id="error-msg">Помилка завантаження PDF:<br>${e.message}</div>`;
  }
}

// ── Toolbar events ─────────────────────────────────────────────────────────
document.getElementById('btn-first') .addEventListener('click', () => goTo(1));
document.getElementById('btn-prev')  .addEventListener('click', () => goTo(currentPage - 1));
document.getElementById('btn-next')  .addEventListener('click', () => goTo(currentPage + 1));
document.getElementById('btn-last')  .addEventListener('click', () => goTo(totalPages));

pageInput.addEventListener('change', () => goTo(parseInt(pageInput.value) || 1));
pageInput.addEventListener('keydown', e => { if (e.key === 'Enter') goTo(parseInt(pageInput.value) || 1); });

document.getElementById('btn-zoom-out').addEventListener('click', () => {
  if (scale === 'fit') scale = 1.0;
  setScale(scale - SCALE_STEP);
});
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  if (scale === 'fit') scale = 1.0;
  setScale(scale + SCALE_STEP);
});
zoomSelect.addEventListener('change', () => setScale(zoomSelect.value));

document.getElementById('btn-rot-l').addEventListener('click', () => { rotation = (rotation - 90 + 360) % 360; renderAll(); });
document.getElementById('btn-rot-r').addEventListener('click', () => { rotation = (rotation + 90) % 360;         renderAll(); });

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.activeElement === pageInput) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  goTo(currentPage + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    goTo(currentPage - 1);
  if (e.key === 'Home') goTo(1);
  if (e.key === 'End')  goTo(totalPages);
  if (e.key === '+' || e.key === '=') { e.preventDefault(); setScale((scale === 'fit' ? 1 : scale) + SCALE_STEP); }
  if (e.key === '-')                  { e.preventDefault(); setScale((scale === 'fit' ? 1 : scale) - SCALE_STEP); }

  if (!canDownload) {
    if (e.ctrlKey && ['s','p','u'].includes(e.key.toLowerCase())) e.preventDefault();
  }
});

if (!canDownload) {
  document.addEventListener('contextmenu', e => e.preventDefault());
}

loadPDF();
</script>
</body>
</html>
