<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>LMS PDF Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: #404040;
  color: #fff;
  font-family: Arial, sans-serif;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* ── Toolbar ── */
#toolbar {
  height: 48px;
  background: #323639;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.5);
  z-index: 10;
}

#toolbar-title {
  font-size: 13px;
  font-weight: 600;
  color: #e2e8f0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 260px;
  flex-shrink: 0;
}

.tb-sep { width: 1px; height: 26px; background: rgba(255,255,255,.15); margin: 0 6px; flex-shrink: 0; }

.tb-center { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }

.tb-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

.tb-btn {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  background: transparent; border: none; border-radius: 6px;
  color: #c8cfd7; cursor: pointer; font-size: 15px;
  transition: background .13s, color .13s; flex-shrink: 0;
}
.tb-btn svg { width: 18px; height: 18px; }
.tb-btn:hover:not(:disabled) { background: rgba(255,255,255,.12); color: #fff; }
.tb-btn:disabled { opacity: .3; cursor: default; }

#page-input {
  width: 44px; text-align: center;
  background: #525659; border: 1px solid #666; border-radius: 5px;
  color: #fff; font-size: 13px; padding: 4px; outline: none;
}
#page-input:focus { border-color: #94a3b8; }
#page-total { font-size: 13px; color: #94a3b8; white-space: nowrap; }

#zoom-val {
  width: 62px; text-align: center;
  background: #525659; border: 1px solid #666; border-radius: 5px;
  color: #fff; font-size: 13px; padding: 4px; outline: none;
}

#download-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: #3b82f6; border: none; border-radius: 6px;
  color: #fff; font-size: 13px; font-weight: 600;
  padding: 6px 14px; cursor: pointer; flex-shrink: 0; transition: background .15s;
}
#download-btn:hover { background: #2563eb; }

/* ── Body layout ── */
#body-wrap { display: flex; flex: 1; min-height: 0; }

/* ── Thumbnail sidebar ── */
#thumb-panel {
  width: 168px; flex-shrink: 0;
  background: #2b2d30;
  border-right: 1px solid rgba(255,255,255,.08);
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  padding: 12px 8px;
}
#thumb-panel::-webkit-scrollbar { width: 5px; }
#thumb-panel::-webkit-scrollbar-track { background: transparent; }
#thumb-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 3px; }

.thumb-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; width: 100%;
}
.thumb-canvas-wrap {
  border: 2px solid transparent; border-radius: 4px; overflow: hidden;
  transition: border-color .13s; box-shadow: 0 2px 6px rgba(0,0,0,.4);
  line-height: 0;
}
.thumb-canvas-wrap:hover { border-color: rgba(148,163,184,.5); }
.thumb-canvas-wrap.active { border-color: #3b82f6; }
.thumb-num {
  font-size: 11px; color: #94a3b8;
}

/* ── Main viewer ── */
#viewer-wrap {
  flex: 1; overflow-y: auto; overflow-x: auto;
  display: flex; flex-direction: column;
  align-items: center; padding: 20px 20px 40px;
  gap: 14px; background: #525659;
}
#viewer-wrap::-webkit-scrollbar { width: 8px; }
#viewer-wrap::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
#viewer-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 4px; }

.page-wrap { position: relative; box-shadow: 0 4px 24px rgba(0,0,0,.6); line-height: 0; }
canvas { display: block; }

#loading-msg { margin-top: 80px; text-align: center; color: #94a3b8; font-size: 14px; }
#error-msg   { margin-top: 80px; text-align: center; color: #f87171; font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span id="toolbar-title"></span>

  <div class="tb-sep"></div>

  <!-- Page nav (center) -->
  <div class="tb-center">
    <button class="tb-btn" id="btn-first" title="Перша сторінка">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
    </button>
    <button class="tb-btn" id="btn-prev" title="Попередня (←)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <input id="page-input" type="number" min="1" value="1" title="Номер сторінки">
    <span id="page-total" style="font-size:13px;color:#94a3b8">/ —</span>
    <button class="tb-btn" id="btn-next" title="Наступна (→)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="tb-btn" id="btn-last" title="Остання сторінка">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Zoom -->
    <button class="tb-btn" id="btn-zoom-out" title="Зменшити (-)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <input id="zoom-val" type="text" value="100%" title="Масштаб (клік — по ширині)" style="cursor:pointer" onclick="setScale('fit')">
    <button class="tb-btn" id="btn-zoom-in" title="Збільшити (+)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Rotate -->
    <button class="tb-btn" id="btn-rot-l" title="Повернути ліворуч">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5"/></svg>
    </button>
    <button class="tb-btn" id="btn-rot-r" title="Повернути праворуч">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-5"/></svg>
    </button>
  </div>

  <!-- Right: download -->
  <div class="tb-right">
    <button id="download-btn" style="display:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Завантажити
    </button>
  </div>
</div>

<!-- Body -->
<div id="body-wrap">
  <div id="thumb-panel"></div>
  <div id="viewer-wrap">
    <div id="loading-msg">Завантаження PDF…</div>
  </div>
</div>

<script>
const params      = new URLSearchParams(location.search);
const fileUrl     = params.get('file');
const title       = params.get('title') || 'PDF';
const canDownload = params.get('download') === '1';

document.getElementById('toolbar-title').textContent = title;
document.title = title;

if (!fileUrl) {
  document.getElementById('viewer-wrap').innerHTML = '<div id="error-msg">Файл не вказано.</div>';
  throw new Error('No file param');
}

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──────────────────────────────────────────────────────────────────
let pdfDoc      = null;
let totalPages  = 0;
let currentPage = 1;
let scale       = 1;
let rotation    = 0;
let rendering   = false;

const SCALE_STEP = 0.25;
const SCALE_MIN  = 0.25;
const SCALE_MAX  = 4.0;
const THUMB_W    = 128;

// ── DOM ───────────────────────────────────────────────────────────────────
const wrap      = document.getElementById('viewer-wrap');
const thumbPanel = document.getElementById('thumb-panel');
const pageInput = document.getElementById('page-input');
const pageTotal = document.getElementById('page-total');
const zoomVal   = document.getElementById('zoom-val');

// ── Helpers ────────────────────────────────────────────────────────────────
function getEffectiveScale(page) {
  if (scale !== 'fit') return scale;
  const vp = page.getViewport({ scale: 1, rotation });
  return (wrap.clientWidth - 48) / vp.width;
}

function updateZoomDisplay() {
  if (scale === 'fit') { zoomVal.value = 'По ширині'; return; }
  zoomVal.value = Math.round(scale * 100) + '%';
}

function updateNav() {
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-prev').disabled  = currentPage <= 1;
  document.getElementById('btn-next').disabled  = currentPage >= totalPages;
  document.getElementById('btn-last').disabled  = currentPage >= totalPages;
  pageInput.value = currentPage;
  thumbPanel.querySelectorAll('.thumb-canvas-wrap').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === currentPage);
  });
}

// ── Render main pages ──────────────────────────────────────────────────────
async function renderAll() {
  if (!pdfDoc || rendering) return;
  rendering = true;
  wrap.innerHTML = '';

  for (let i = 1; i <= totalPages; i++) {
    const page      = await pdfDoc.getPage(i);
    const effScale  = getEffectiveScale(page);
    const viewport  = page.getViewport({ scale: effScale, rotation });

    const pageWrap  = document.createElement('div');
    pageWrap.className = 'page-wrap';
    pageWrap.dataset.page = i;

    const canvas   = document.createElement('canvas');
    canvas.width   = viewport.width;
    canvas.height  = viewport.height;
    pageWrap.appendChild(canvas);
    wrap.appendChild(pageWrap);

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }

  rendering = false;
  updateNav();
  scrollToPage(currentPage, false);
}

// ── Render thumbnails ──────────────────────────────────────────────────────
async function renderThumbs() {
  thumbPanel.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    const page     = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale: 1, rotation: 0 });
    const ts       = THUMB_W / viewport.width;
    const tvp      = page.getViewport({ scale: ts, rotation: 0 });

    const item     = document.createElement('div');
    item.className = 'thumb-item';
    item.dataset.page = i;

    const wrap2 = document.createElement('div');
    wrap2.className = 'thumb-canvas-wrap' + (i === 1 ? ' active' : '');

    const canvas  = document.createElement('canvas');
    canvas.width  = tvp.width;
    canvas.height = tvp.height;
    canvas.style.display = 'block';

    await page.render({ canvasContext: canvas.getContext('2d'), viewport: tvp }).promise;

    wrap2.appendChild(canvas);
    const num = document.createElement('span');
    num.className = 'thumb-num';
    num.textContent = i;

    item.appendChild(wrap2);
    item.appendChild(num);
    item.addEventListener('click', () => goTo(i));
    thumbPanel.appendChild(item);
  }
}

// ── Navigation ─────────────────────────────────────────────────────────────
function scrollToPage(num, smooth = true) {
  const el = wrap.querySelector(`[data-page="${num}"]`);
  if (el) el.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', block: 'start' });
}

function goTo(num) {
  num = Math.max(1, Math.min(totalPages, num));
  currentPage = num;
  updateNav();
  scrollToPage(num);
  if (num === totalPages) setTimeout(notifyScrollEnd, 600);
}

// ── Zoom ───────────────────────────────────────────────────────────────────
function setScale(val) {
  scale = val === 'fit' ? 'fit' : Math.max(SCALE_MIN, Math.min(SCALE_MAX, parseFloat(val)));
  updateZoomDisplay();
  renderAll();
}

// ── Scroll → page tracker ──────────────────────────────────────────────────
let scrollEndSent = false;
function notifyScrollEnd() {
  if (scrollEndSent) return;
  scrollEndSent = true;
  window.parent.postMessage({ type: 'pdf-scroll-end' }, '*');
}

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio >= 0.1) {
      const p = parseInt(e.target.dataset.page);
      if (p !== currentPage) { currentPage = p; updateNav(); }
      if (p === totalPages) notifyScrollEnd();
    }
  });
}, { threshold: [0.1, 0.4] });

function observePages() {
  wrap.querySelectorAll('.page-wrap').forEach(el => io.observe(el));
  if (totalPages === 1) notifyScrollEnd();
  wrap.addEventListener('scroll', () => {
    if (wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 80) notifyScrollEnd();
  }, { passive: true });
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadPDF() {
  try {
    pdfDoc     = await pdfjsLib.getDocument(fileUrl).promise;
    totalPages = pdfDoc.numPages;
    pageTotal.textContent = '/ ' + totalPages;
    pageInput.max         = totalPages;

    await renderAll();
    observePages();
    renderThumbs(); // async, no await — loads in background

    document.getElementById('loading-msg')?.remove();

    if (canDownload) {
      const btn = document.getElementById('download-btn');
      btn.style.display = 'inline-flex';
      btn.addEventListener('click', async () => {
        try {
          btn.disabled = true;
          btn.textContent = 'Завантаження…';
          const res  = await fetch(fileUrl);
          const blob = await res.blob();
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href     = url;
          a.download = title.endsWith('.pdf') ? title : title + '.pdf';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
        } catch(e) {
          alert('Помилка завантаження: ' + e.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Завантажити';
        }
      });
    }
  } catch (e) {
    wrap.innerHTML = `<div id="error-msg">Помилка завантаження PDF:<br>${e.message}</div>`;
  }
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById('btn-first').addEventListener('click', () => goTo(1));
document.getElementById('btn-prev') .addEventListener('click', () => goTo(currentPage - 1));
document.getElementById('btn-next') .addEventListener('click', () => goTo(currentPage + 1));
document.getElementById('btn-last') .addEventListener('click', () => goTo(totalPages));

pageInput.addEventListener('change',  () => goTo(parseInt(pageInput.value) || 1));
pageInput.addEventListener('keydown', e => { if (e.key === 'Enter') goTo(parseInt(pageInput.value) || 1); });

document.getElementById('btn-zoom-out').addEventListener('click', () =>
  setScale(scale === 'fit' ? 0.75 : scale - SCALE_STEP));
document.getElementById('btn-zoom-in').addEventListener('click', () =>
  setScale(scale === 'fit' ? 1.25 : scale + SCALE_STEP));

document.getElementById('btn-rot-l').addEventListener('click', () => { rotation = (rotation - 90 + 360) % 360; renderAll(); });
document.getElementById('btn-rot-r').addEventListener('click', () => { rotation = (rotation + 90) % 360; renderAll(); });

document.addEventListener('keydown', e => {
  if (document.activeElement === pageInput) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentPage + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentPage - 1);
  if (e.key === 'Home') goTo(1);
  if (e.key === 'End')  goTo(totalPages);
  if (e.key === '+' || e.key === '=') { e.preventDefault(); setScale((scale === 'fit' ? 1 : scale) + SCALE_STEP); }
  if (e.key === '-')                  { e.preventDefault(); setScale((scale === 'fit' ? 1 : scale) - SCALE_STEP); }
  if (!canDownload && e.ctrlKey && ['s','p','u'].includes(e.key.toLowerCase())) e.preventDefault();
});

if (!canDownload) {
  document.addEventListener('contextmenu', e => e.preventDefault());
}

window.addEventListener('resize', () => { if (scale === 'fit') renderAll(); });

loadPDF();
</script>
</body>
</html>
